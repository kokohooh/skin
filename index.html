<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft皮肤指令生成器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --grass: #5b9c64;
            --dirt: #8b6d4b;
            --stone: #7d7d7d;
            --wood: #8f563b;
            --water: #3d73c4;
            --sky: #7ec0ee;
            --dark: #2c2c2c;
            --light: #f5f5f5;
            --accent: #ff6b00;
            --accent2: #4caf50;
            --shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s ease;
            --diamond: #4dccc6;
            --emerald: #2ecc71;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a2a3a, #0c1620);
            color: var(--light);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .pixel-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 109, 75, 0.1) 0px, transparent 2px),
                radial-gradient(circle at 80% 40%, rgba(91, 156, 100, 0.1) 0px, transparent 3px),
                radial-gradient(circle at 30% 70%, rgba(125, 125, 125, 0.1) 0px, transparent 4px);
            background-size: 40px 40px;
            z-index: 0;
            opacity: 0.3;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0 20px;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow);
            margin-top: 20px;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: var(--diamond);
            text-shadow: 0 0 10px rgba(77, 204, 198, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #bbb;
            margin-bottom: 25px;
            max-width: 700px;
            margin: 0 auto 30px;
            line-height: 1.8;
        }

        .minecraft-font {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            max-width: 500px;
            width: 100%;
            position: relative;
        }

        .search-box input {
            flex: 1;
            padding: 16px 25px;
            border: 2px solid var(--emerald);
            border-radius: 50px;
            font-size: 1.05rem;
            background: rgba(0, 0, 0, 0.6);
            color: var(--light);
            transition: var(--transition);
            font-family: 'Press Start 2P', cursive;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--diamond);
            box-shadow: 0 0 15px rgba(77, 204, 198, 0.4);
        }

        .search-box button {
            position: absolute;
            right: 8px;
            top: 8px;
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--emerald), var(--diamond));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            font-family: 'Press Start 2P', cursive;
            letter-spacing: 1px;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.5);
        }

        .theme-toggle {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--diamond);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--light);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .theme-toggle:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
            color: var(--gold);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            border: 2px solid var(--diamond);
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 15px 30px rgba(241, 196, 15, 0.3);
        }

        .card-header {
            background: rgba(77, 204, 198, 0.6);
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid var(--diamond);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--light);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            font-family: 'Press Start 2P', cursive;
            letter-spacing: 1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-image-container {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
        }

        .card-image {
            image-rendering: pixelated;
            width: 128px;
            height: 128px;
            transition: var(--transition);
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.5));
            border: 2px solid var(--stone);
        }

        .card:hover .card-image {
            transform: scale(1.1);
            border-color: var(--gold);
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .copy-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--emerald), var(--diamond));
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .command-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--gold), #e67e22);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .copy-btn:hover, .command-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.5);
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--emerald), var(--diamond));
            color: white;
            padding: 18px 35px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            opacity: 0;
            transition: opacity 0.3s, transform 0.4s;
            z-index: 1000;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .stats {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            border: 2px solid var(--diamond);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 40px auto 0;
            backdrop-filter: blur(5px);
        }

        .stats span {
            font-weight: 700;
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px 0;
            color: #aaa;
            font-size: 1rem;
            border-top: 2px solid var(--diamond);
        }

        .minecraft-block {
            position: absolute;
            width: 40px;
            height: 40px;
            background-size: cover;
            z-index: -1;
        }

        .block-1 {
            top: 10%;
            left: 5%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="%234dccc6"/><path d="M0,0 L40,0 L40,10 L30,10 L30,20 L20,20 L20,30 L10,30 L10,40 L0,40 Z" fill="%233bb9b3"/><path d="M0,0 L10,0 L10,10 L20,10 L20,20 L30,20 L30,30 L40,30 L40,40 L0,40 Z" fill="%235fdfd9"/></svg>');
            animation: float 6s infinite ease-in-out;
        }

        .block-2 {
            top: 25%;
            right: 7%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="%23f1c40f"/><path d="M0,0 L40,0 L40,10 L30,10 L30,20 L20,20 L20,30 L10,30 L10,40 L0,40 Z" fill="%23d9b20b"/><path d="M0,0 L10,0 L10,10 L20,10 L20,20 L30,20 L30,30 L40,30 L40,40 L0,40 Z" fill="%23ffd726"/></svg>');
            animation: float 8s infinite ease-in-out;
        }

        .block-3 {
            bottom: 20%;
            left: 8%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="%232ecc71"/><path d="M0,0 L40,0 L40,10 L30,10 L30,20 L20,20 L20,30 L10,30 L10,40 L0,40 Z" fill="%2327ae60"/><path d="M0,0 L10,0 L10,10 L20,10 L20,20 L30,20 L30,30 L40,30 L40,40 L0,40 Z" fill="%2335e081"/></svg>');
            animation: float 7s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .instruction-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
            border: 2px solid var(--diamond);
            backdrop-filter: blur(5px);
        }

        .instruction-section h2 {
            font-family: 'Press Start 2P', cursive;
            color: var(--gold);
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5rem;
        }

        .steps {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .step {
            background: rgba(77, 204, 198, 0.2);
            border-radius: 10px;
            padding: 20px;
            flex: 1;
            min-width: 250px;
            text-align: center;
        }

        .step-number {
            font-family: 'Press Start 2P', cursive;
            background: var(--diamond);
            color: var(--dark);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 1.2rem;
        }

        .step p {
            margin-top: 10px;
            font-size: 1rem;
        }

        @media (max-width: 1100px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 25px;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }
            
            .card-image-container {
                height: 180px;
            }
        }

        @media (max-width: 480px) {
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .search-box {
                width: 100%;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .card-image {
                width: 96px;
                height: 96px;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-bg"></div>
    
    <div class="minecraft-block block-1"></div>
    <div class="minecraft-block block-2"></div>
    <div class="minecraft-block block-3"></div>
    
    <div class="container">
        <header>
            <div class="header-content">
                <h1>MINECRAFT 皮肤指令生成器</h1>
                <p class="subtitle">一键生成并复制皮肤设置指令，轻松更换您的Minecraft角色皮肤</p>
                
                <div class="controls">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索皮肤名称...">
                        <button id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
                    </div>
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <div class="instruction-section">
            <h2>如何使用</h2>
            <div class="steps">
                <div class="step">
                    <div class="step-number">1</div>
                    <i class="fas fa-search fa-2x" style="color: var(--diamond);"></i>
                    <p>在下方找到您喜欢的皮肤</p>
                </div>
                <div class="step">
                    <div class="step-number">2</div>
                    <i class="fas fa-copy fa-2x" style="color: var(--gold);"></i>
                    <p>点击"复制指令"按钮</p>
                </div>
                <div class="step">
                    <div class="step-number">3</div>
                    <i class="fas fa-gamepad fa-2x" style="color: var(--emerald);"></i>
                    <p>在游戏中粘贴并执行指令</p>
                </div>
            </div>
        </div>
        
        <div class="grid" id="imageGrid">
            <!-- 皮肤卡片将通过JavaScript动态生成 -->
        </div>
        
        <div class="stats">
            共收藏 <span id="imageCount">0</span> 个Minecraft皮肤
        </div>
        
        <footer>
            <p>© 2023 Minecraft皮肤指令生成器 | 专为Minecraft玩家打造的皮肤管理工具</p>
        </footer>
    </div>
    
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">皮肤指令已复制到剪贴板！</span>
    </div>

    <script>
        // 皮肤数据
        const skins = [
            { name: "StarPlatinum白金之星", file: "StarPlatinum白金之星.png" },
            { name: "Boki", file: "boki.png" },
            { name: "小樱", file: "xiaoying.png" },
            { name: "雾子KIRIKO", file: "守望先锋雾子KIRIKO.png" },
            { name: "宇智波佐助", file: "火影忍者-宇智波-佐助.png" },
            { name: "忍战破面带土", file: "火影忍者——忍战破面带土.png" },
            { name: "明日香·兰格雷", file: "Eva新世纪福音战士-惣流(式波)·明日香·兰格雷.png" },
            { name: "迪奥布兰度", file: "JOJO的奇妙冒险迪奥布兰度(Dio-面包-砸瓦鲁多-世界-替身使者-恶人的救星-西内卡Q因-木.png" },
            { name: "初音未来", file: "miku绿毛初音未来（搬运）.png" },
            { name: "坤坤", file: "中分头，背带裤的坤坤.png" },
            { name: "五条悟", file: "五条悟.png" },
            { name: "初音未来公式服", file: "初音未来Miku公式服ver..png" },
            { name: "小鸟游六花", file: "小鸟游六花.png" },
            { name: "超天酱", file: "超天酱(主播女孩重度依赖).png" },
            { name: "Dio", file: "dio7.png" },
            { name: "空条承太郎", file: "JOJO空条承太郎.png" },
            { name: "空条徐伦", file: "JOJO空条徐伦.png" },
            { name: "World", file: "world.png" },
            { name: "Yu", file: "yu.png" },
            { name: "带土-白面具", file: "带土-白面具.png" },
            { name: "迪迦奥特曼", file: "迪迦奥特曼.png" },
            { name: "三笠", file: "进击的巨人三笠.png" },
            { name: "镜音铃", file: "镜音铃.png" },
            { name: "卡卡", file: "卡卡.png" },
            { name: "美树沙耶香", file: "美树沙耶香.png" },
            { name: "佩恩·天道【超】", file: "佩恩 ·天道【超】.png" },
            { name: "四代目火影", file: "四代目火影.png" },
            { name: "桃博", file: "桃博.png" },
            { name: "薇尔莉特", file: "薇尔莉特.png" },
            { name: "永雏塔菲", file: "永雏塔菲.png" },
            { name: "鼬", file: "鼬.png" },
            { name: "可莉", file: "原神-可莉.png" },
            { name: "鹰佐", file: "鹰佐.png" }
        ];

        // 基础URL
        const baseUrl = "https://kokohooh.github.io/skin/";

        // DOM元素
        const imageGrid = document.getElementById('imageGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const themeToggle = document.getElementById('themeToggle');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        const imageCount = document.getElementById('imageCount');

        // 渲染皮肤卡片
        function renderSkins(skinsArray) {
            imageGrid.innerHTML = '';
            
            skinsArray.forEach(skin => {
                const imageUrl = baseUrl + encodeURIComponent(skin.file);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${skin.name}</h3>
                    </div>
                    <div class="card-image-container">
                        <img src="${imageUrl}" alt="${skin.name}" class="card-image" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="card-actions">
                            <button class="copy-btn" data-url="${imageUrl}">
                                <i class="fas fa-link"></i> 复制URL
                            </button>
                            <button class="command-btn" data-file="${skin.file}">
                                <i class="fas fa-terminal"></i> 复制指令
                            </button>
                        </div>
                    </div>
                `;
                
                imageGrid.appendChild(card);
            });
            
            // 更新统计信息
            imageCount.textContent = skinsArray.length;
            
            // 添加复制事件监听器
            document.querySelectorAll('.copy-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const url = button.getAttribute('data-url');
                    copyToClipboard(url);
                    toastMessage.textContent = "皮肤URL已复制到剪贴板！";
                    showToast();
                });
            });
            
            // 添加复制指令事件监听器
            document.querySelectorAll('.command-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const file = button.getAttribute('data-file');
                    const imageUrl = baseUrl + encodeURIComponent(file);
                    const command = `/skin set web classic "${imageUrl}"`;
                    copyToClipboard(command);
                    toastMessage.textContent = "皮肤指令已复制到剪贴板！";
                    showToast();
                    
                    // 调试信息
                    console.log("复制的指令:", command);
                });
            });
        }

        // 复制到剪贴板
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                console.log("复制成功:", text);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }

        // 显示提示
        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // 搜索功能
        function searchSkins() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredSkins = skins.filter(skin => 
                skin.name.toLowerCase().includes(searchTerm) || 
                skin.file.toLowerCase().includes(searchTerm)
            );
            renderSkins(filteredSkins);
        }

        // 主题切换
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = themeToggle.querySelector('i');
            if (document.body.classList.contains('light-mode')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                document.body.style.background = "linear-gradient(135deg, #a5c9e6, #d4e4f1)";
                document.body.style.color = "#333";
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                document.body.style.background = "linear-gradient(135deg, #1a2a3a, #0c1620)";
                document.body.style.color = "#f5f5f5";
            }
        }

        // 事件监听器
        searchBtn.addEventListener('click', searchSkins);
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                searchSkins();
            }
        });
        themeToggle.addEventListener('click', toggleTheme);

        // 初始化
        renderSkins(skins);
    </script>
</body>
</html>
